spring:
  datasource:
    url: jdbc:h2:mem:hkapi;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# Default the general API tests to the dev-like relaxed gate: they exercise CRUD, not
# the verification flow, so signups are born verified. VerificationApiTest flips this
# back on via @TestPropertySource to cover the actual gate.
app:
  verification:
    enabled: false
