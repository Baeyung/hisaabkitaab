services:
  postgres:
    image: postgres:latest
    container_name: hisaabkitaab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hkadmin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: hisaabkitaab
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hkadmin -d hisaabkitaab"]
      interval: 10s
      timeout: 5s
      retries: 5

  activemq:
    image: apache/activemq-classic:latest
    container_name: hisaabkitaab-activemq
    restart: unless-stopped
    environment:
      ACTIVEMQ_CONNECTION_USER: hkadmin
      ACTIVEMQ_CONNECTION_PASSWORD: admin
      ACTIVEMQ_WEB_USER: hkadmin
      ACTIVEMQ_WEB_PASSWORD: admin
    ports:
      - "61616:61616"  # OpenWire (broker)
      - "8161:8161"    # Web console -> http://localhost:8161
    volumes:
      - activemq-data:/opt/apache-activemq/data

volumes:
  postgres-data:
  activemq-data:
